<head>

<title>YOLO Medical Augmentation Framework</title>
<style>
  :root {
    --color-bg: #f8f7f4;
    --color-surface: #ffffff;
    --color-text-primary: #1a1a18;
    --color-text-secondary: #5a5a56;
    --color-border: rgba(0,0,0,0.12);

    --teal-50: #E1F5EE; --teal-100: #9FE1CB; --teal-600: #0F6E56; --teal-800: #085041;
    --purple-50: #EEEDFE; --purple-100: #CECBF6; --purple-600: #534AB7; --purple-800: #3C3489;
    --blue-50: #E6F1FB; --blue-100: #B5D4F4; --blue-600: #185FA5; --blue-800: #0C447C;
    --amber-50: #FAEEDA; --amber-100: #FAC775; --amber-600: #854F0B; --amber-800: #633806;
    --coral-50: #FAECE7; --coral-100: #F5C4B3; --coral-600: #993C1D; --coral-800: #712B13;
    --gray-50: #F1EFE8; --gray-100: #D3D1C7; --gray-600: #5F5E5A; --gray-800: #444441;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --color-bg: #1c1c1a;
      --color-surface: #252523;
      --color-text-primary: #e8e6df;
      --color-text-secondary: #9c9a92;
      --color-border: rgba(255,255,255,0.1);

      --teal-50: #04342C; --teal-100: #085041; --teal-600: #5DCAA5; --teal-800: #9FE1CB;
      --purple-50: #26215C; --purple-100: #3C3489; --purple-600: #AFA9EC; --purple-800: #CECBF6;
      --blue-50: #042C53; --blue-100: #0C447C; --blue-600: #85B7EB; --blue-800: #B5D4F4;
      --amber-50: #412402; --amber-100: #633806; --amber-600: #EF9F27; --amber-800: #FAC775;
      --coral-50: #4A1B0C; --coral-100: #712B13; --coral-600: #F0997B; --coral-800: #F5C4B3;
      --gray-50: #2C2C2A; --gray-100: #444441; --gray-600: #B4B2A9; --gray-800: #D3D1C7;
    }
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--color-bg);
    color: var(--color-text-primary);
    font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
    padding: 32px 24px;
    min-height: 100vh;
  }
  h1 {
    font-size: 18px;
    font-weight: 500;
    color: var(--color-text-primary);
    margin-bottom: 6px;
  }
  p.sub {
    font-size: 13px;
    color: var(--color-text-secondary);
    margin-bottom: 24px;
  }
  .card {
    background: var(--color-surface);
    border: 1px solid var(--color-border);
    border-radius: 12px;
    padding: 24px;
    overflow-x: auto;
  }
  svg text { font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; }
  /* Color classes mirroring the widget system */
  .c-teal rect, .c-teal circle, .c-teal ellipse { fill: var(--teal-50); stroke: var(--teal-600); }
  .c-teal text { fill: var(--teal-800); }
  .c-purple rect, .c-purple circle, .c-purple ellipse { fill: var(--purple-50); stroke: var(--purple-600); }
  .c-purple text { fill: var(--purple-800); }
  .c-blue rect, .c-blue circle, .c-blue ellipse { fill: var(--blue-50); stroke: var(--blue-600); }
  .c-blue text { fill: var(--blue-800); }
  .c-amber rect, .c-amber circle, .c-amber ellipse { fill: var(--amber-50); stroke: var(--amber-600); }
  .c-amber text { fill: var(--amber-800); }
  .c-coral rect, .c-coral circle, .c-coral ellipse { fill: var(--coral-50); stroke: var(--coral-600); }
  .c-coral text { fill: var(--coral-800); }
  .c-gray rect, .c-gray circle, .c-gray ellipse { fill: var(--gray-50); stroke: var(--gray-600); }
  .c-gray text { fill: var(--gray-800); }
  .box rect { fill: var(--color-surface); stroke: var(--color-border); }
  .box text { fill: var(--color-text-secondary); }
  .arr { stroke: var(--color-text-secondary); stroke-width: 1; fill: none; }
  .t  { font-size: 14px; font-weight: 400; fill: var(--color-text-primary); }
  .ts { font-size: 12px; font-weight: 400; fill: var(--color-text-secondary); }
  .th { font-size: 14px; font-weight: 500; fill: var(--color-text-primary); }
</style>
</head>
