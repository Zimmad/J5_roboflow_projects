# Heavy but still medical-aware
hsv_h: 0.02
hsv_s: 0.7
hsv_v: 0.5

degrees: 12.0
translate: 0.2
scale: 0.5
shear: 8.0
perspective: 0.001

flipud: 0.0           # keep disabled
fliplr: 0.5

# Advanced techniques - test these carefully
mosaic: 1.0           # Mosaic is often one of the best for detection
mixup: 0.2
copy_paste: 0.3       # good if you have rare classes/lesions

# Extra (if you want even stronger)
# close_mosaic: 10    # disable Mosaic in last 10 epochs (add in training command)